<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found | eexams</title>
  <meta name="robots" content="noindex, nofollow" />
  <script>
    // SPA fallback: preserve the path so React Router renders the correct route (including NotFound).
    // Encode the path into a query parameter that main.jsx can decode and replay via history.
    (function(l) {
      var path = l.pathname + l.search + l.hash;
      var redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(path);
      window.location.replace(redirectUrl);
    }(window.location));
  </script>
</head>
<body>
  <p>Loading eexams...</p>
</body>
</html>
