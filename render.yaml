services:
  # Frontend service
  - type: web
    name: eexams-frontend
    env: node
    plan: free
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npm install -g serve && serve -s dist -l 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://eexamsbackend.onrender.com/api
  
  # Backend API service
  - type: web
    name: nationalscore-api
    env: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # This will be set manually in the Render dashboard
      - key: JWT_SECRET
        sync: false # This will be set manually in the Render dashboard
      - key: GROQ_API_KEY
        sync: false # This will be set manually in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false # This will be set manually in the Render dashboard
      - key: FRONTEND_URL
        value: https://www.eexams.net
      - key: UPLOADS_PATH
        value: /app/tmp/uploads
      - key: CLOUDINARY_CLOUD_NAME
        sync: false # Set manually in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false # Set manually in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false # Set manually in Render dashboard
