services:
  # Frontend service
  - type: web
    name: eexams-frontend
    env: node
    plan: free
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npm install -g serve && serve -s dist -l 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://eexamsbackend.onrender.com/api
  
  # Backend API service
  - type: web
    name: nationalscore-api
    env: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # This will be set manually in the Render dashboard
      - key: JWT_SECRET
        sync: false # This will be set manually in the Render dashboard
      - key: GROQ_API_KEY
        sync: false # This will be set manually in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false # This will be set manually in the Render dashboard
      - key: FRONTEND_URL
        value: https://www.eexams.net
      - key: UPLOADS_PATH
        value: /app/tmp/uploads
      - key: CLOUDINARY_CLOUD_NAME
        sync: false # Set manually in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false # Set manually in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false # Set manually in Render dashboard

  # Scheduled database backup - runs independently of the web service, so a
  # backup still happens even if the web service has spun down (free/starter
  # instances sleep when idle, which would silently skip an in-process cron tick).
  - type: cron
    name: eexams-db-backup
    env: docker
    plan: starter
    dockerfilePath: server/Dockerfile
    dockerContext: server
    dockerCommand: node scripts/runBackup.js
    schedule: "0 2 * * *" # 2am UTC daily; adjust to taste
    envVars:
      - key: MONGODB_URI
        sync: false # Same value as the web service
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: BACKUP_RETENTION_DAYS
        value: "14"
