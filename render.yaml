services:
  # Backend API service
  - type: web
    name: nationalscore-api
    env: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # This will be set manually in the Render dashboard
      - key: JWT_SECRET
        sync: false # This will be set manually in the Render dashboard
      - key: GROQ_API_KEY
        sync: false # This will be set manually in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false # This will be set manually in the Render dashboard
      - key: FRONTEND_URL
        value: https://eexams-z1ob.onrender.com
      - key: UPLOADS_PATH
        value: /app/server/tmp/uploads
